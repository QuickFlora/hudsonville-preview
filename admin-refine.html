:root{--ink:#1b2733;--muted:#727c86;--line:#dbe1e8;--accent:#1f7a54;--accent-tint:#eef6f1;--band:#f4f6f8;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Segoe UI",Arial,Helvetica,sans-serif;font-size:10.5px;color:var(--ink);line-height:1.3}
html,body{width:8.5in;margin:0 auto;-webkit-print-color-adjust:exact;print-color-adjust:exact}
.page{width:8.5in;min-height:11in;padding:.3in .34in .24in .34in;background:#fff;display:flex;flex-direction:column}
.l{color:var(--muted);font-weight:400;margin-right:5px;white-space:nowrap}
.v{font-weight:700;word-break:break-word;overflow-wrap:anywhere}
.f{display:flex;gap:0;margin-bottom:2px;align-items:baseline}
.f .l{flex:0 0 auto}.f .v{flex:1 1 auto;min-width:0}
.csz{display:flex;flex-wrap:wrap;gap:1px 4px;align-items:baseline;margin-bottom:2px}
.csz .l{margin-right:2px}
.csz .cv{font-weight:700;margin-right:8px;word-break:break-word;overflow-wrap:anywhere}
.report-header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding-bottom:5px;margin-bottom:8px}
.hdr-left{display:flex;align-items:center;gap:11px}
.delivery-pill{background:var(--accent-tint);color:var(--accent);font-size:14px;font-weight:700;letter-spacing:.3px;padding:4px 12px;border-radius:4px;text-transform:uppercase}
.hdr-date .d1{font-size:15px;font-weight:700}
.hdr-center{flex:1;text-align:center}
.hdr-center .dow{font-size:26px;font-weight:800;letter-spacing:2px;text-transform:uppercase;line-height:1}
.hdr-right{display:flex;align-items:center;gap:10px}
.hdr-right .ord-block{text-align:center;line-height:1.05}
.ord-label{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.ord-num{font-size:20px;font-weight:800}
.copy-stamp{display:inline-block;margin-top:1px;font-size:8px;font-weight:700;color:#fff;background:var(--accent);padding:1px 7px;border-radius:3px;letter-spacing:.5px}
.sh{border-left:3px solid var(--accent);background:var(--band);padding:3px 8px;font-weight:700;font-size:9.5px;text-transform:uppercase;letter-spacing:.6px;margin:6px 0 3px}
.cols3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px 22px}
.colbox{min-width:0}
.free{font-weight:700;word-break:break-word;overflow-wrap:anywhere}
.freewrap{margin-bottom:3px}
.freewrap .l{display:block;color:var(--muted);font-weight:400;margin-bottom:1px;white-space:normal}
table.od{width:100%;border-collapse:collapse;table-layout:fixed;margin-top:2px}
table.od th{border-bottom:1.5px solid var(--accent);padding:3px 6px;text-align:left;font-size:8.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);font-weight:700}
table.od td{border-bottom:1px solid var(--line);padding:3px 6px;vertical-align:top;font-weight:700;word-break:break-word;overflow-wrap:anywhere}
table.od th.r,table.od td.r{text-align:right}table.od th.c,table.od td.c{text-align:center}
table.od tr.desc td{font-weight:400;font-style:italic;color:#59636e;border-bottom:1px solid var(--line);padding:0 6px 3px 24px}
.totals{display:flex;margin-top:5px;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.totals .c{flex:1;padding:4px 6px;display:flex;flex-direction:column;gap:1px;border-right:1px solid var(--line)}
.totals .c:last-child{border-right:none}
.totals .c .tl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.totals .c .ta{font-weight:700;word-break:break-word}
.totals .c.tot .tl{color:var(--accent)}.totals .c.tot .ta{color:var(--accent);font-weight:800;font-size:12px}
.ts{display:flex;margin-top:6px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);align-items:stretch}
.ts .tlab{font-size:8.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:700;padding:4px 8px 4px 0;align-self:center;white-space:nowrap}
.ts .tc{flex:1 1 0;min-width:0;padding:4px 5px;border-left:1px solid var(--line);display:flex;flex-direction:column;gap:1px}
.ts .tc .tl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.ts .tc .tv{font-weight:700;font-size:8.3px;white-space:nowrap;letter-spacing:-.1px}
.notes-line{margin-top:6px}
.notes-line .l{color:var(--muted);font-weight:400;text-transform:uppercase;font-size:8.5px;letter-spacing:.5px;margin-right:6px}
.report-footer{display:flex;justify-content:space-between;align-items:flex-end;font-size:8.5px;color:var(--muted);margin-top:6px;padding-top:6px;border-top:1px solid var(--line)}
.bottom-spacer{flex:1 1 auto;min-height:6px}
.report-footer .pg{font-weight:700;color:var(--ink)}
.print-audit{font-size:7.5px;color:var(--muted);text-align:center;padding-top:3px}
.print-audit b{color:var(--ink);font-weight:700}
@media print{html,body{width:8.5in;margin:0}@page{size:letter;margin:0}}
@media screen{body{background:#d9dee3;padding:20px}.page{box-shadow:0 2px 18px rgba(0,0,0,.18);border-radius:2px;margin:0 auto}}
