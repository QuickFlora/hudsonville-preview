  <style rel="stylesheet">:root{--bg:#f6f7f9;--panel:#fff;--ink:#1f2937;--muted:#6b7280;--line:#e5e7eb;--brand:#2f5d4e;--brand-d:#244a3e;--accent:#c76b73;--ok:#0f7b4f;--warn:#b45309;--bad:#b91c1c;--soft:#eef2f0}*{box-sizing:border-box}body{background:var(--bg);color:var(--ink);margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Noto Sans,Ubuntu,Cantarell,Helvetica Neue,sans-serif;font-size:14px}.app{min-height:100vh;display:flex}aside{background:var(--brand-d);color:#dbe7e1;flex:none;width:236px;padding:16px 0}aside h1{color:#fff;margin:0 18px 2px;font-size:16px}aside .sub{color:#9fb8ac;margin:0 18px 16px;font-size:11px}aside .grp{text-transform:uppercase;letter-spacing:.1em;color:#7e9b8e;margin:16px 18px 6px;font-size:10px}aside a{color:#dbe7e1;cursor:pointer;border-left:3px solid #0000;padding:8px 18px;font-size:13.5px;text-decoration:none;display:block}aside a:hover{background:#ffffff0f}aside a.on{border-left-color:var(--accent);color:#fff;background:#ffffff1a;font-weight:600}main{flex:1;padding:22px 26px;overflow:auto}h2{margin:0 0 4px;font-size:21px}h3{margin:0 0 10px;font-size:15px}.sub2{color:var(--muted);margin-bottom:16px;font-size:13px}.lnk{color:var(--accent);cursor:pointer}.panel{background:var(--panel);border:1px solid var(--line);border-radius:10px;margin-bottom:16px;padding:16px}.bar{flex-wrap:wrap;align-items:center;gap:10px;margin-bottom:12px;display:flex}input,select,textarea{border:1px solid var(--line);background:#fff;border-radius:7px;padding:8px 10px;font-family:inherit;font-size:13.5px}input[type=checkbox]{width:auto}.chk{white-space:nowrap;align-items:center;gap:7px;font-size:13.5px;display:flex}button{background:var(--brand);color:#fff;cursor:pointer;border:none;border-radius:7px;padding:8px 14px;font-family:inherit;font-size:13px;font-weight:600}button.sec{background:var(--soft);color:var(--brand)}button.danger{background:var(--bad)}button:disabled{opacity:.5;cursor:not-allowed}table{border-collapse:collapse;width:100%;font-size:13px}th{text-align:left;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:1px solid var(--line);white-space:nowrap;padding:8px;font-size:11px}td{border-bottom:1px solid var(--line);vertical-align:top;padding:9px 8px}tr.click:hover{background:var(--soft);cursor:pointer}.acts{flex-wrap:wrap;gap:5px;display:flex}.acts button{padding:5px 9px;font-size:11.5px}.pill{white-space:nowrap;border-radius:20px;padding:2px 9px;font-size:11px;font-weight:600;display:inline-block}.pill.NEW{color:#1d4ed8;background:#e0edff}.pill.APPROVED{color:var(--ok);background:#dcfce7}.pill.PRINTED{color:var(--warn);background:#fef3c7}.pill.SHIPPED{color:#5b21b6;background:#ddd6fe}.pill.BILLED{color:#374151;background:#e5e7eb}.pill.BAD{color:var(--bad);background:#fee2e2}.kpi{grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:16px;display:grid}.kpi div{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px}.kpi b{margin-top:4px;font-size:22px;display:block}.kpi span{color:var(--muted);text-transform:uppercase;letter-spacing:.06em;font-size:11.5px}.grid2{grid-template-columns:1fr 1fr;gap:14px;display:grid}.err{color:var(--bad);background:#fef2f2;border:1px solid #fecaca;border-radius:8px;margin:10px 0;padding:10px}label.f{text-transform:uppercase;color:var(--muted);letter-spacing:.05em;margin:8px 0 3px;font-size:11px;display:block}.mono{font-family:ui-monospace,Menlo,monospace;font-size:12px}.kgrid{grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:16px;display:grid}.kcard{background:var(--panel);border:1px solid var(--line);border-radius:12px;flex-direction:column;gap:3px;padding:14px 15px;display:flex;position:relative;overflow:hidden}.kcard:before{content:"";background:var(--brand);width:4px;position:absolute;top:0;bottom:0;left:0}.klab{color:var(--muted);text-transform:uppercase;letter-spacing:.07em;font-size:10.5px}.kval{color:var(--brand);font-size:23px;line-height:1.15}.ksub{color:var(--muted);font-size:11px}.dgrid{grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px;display:grid}.dgrid .panel:nth-child(n+3){grid-column:auto}.dgrid{grid-template-areas:"a b""c d""e f"}.dgrid>.panel:first-child{grid-area:a}.dgrid>.panel:nth-child(2){grid-area:b}.dgrid>.panel:nth-child(3){grid-area:c}.dgrid>.panel:nth-child(4){grid-area:d}.dgrid>.panel:nth-child(5){grid-area:e}.dgrid>.panel:nth-child(6){grid-area:f}.phead{justify-content:space-between;align-items:baseline;display:flex}.axis{color:var(--muted);justify-content:space-between;margin-top:4px;font-size:11px;display:flex}.leg{cursor:pointer;border-bottom:1px solid var(--line);align-items:center;gap:8px;padding:4px 0;font-size:13px;display:flex}.leg:last-child{border-bottom:none}.leg i{border-radius:3px;flex:none;width:10px;height:10px}.leg span{flex:1}.leg b{font-variant-numeric:tabular-nums}.mgrid{grid-template-columns:repeat(4,1fr);gap:12px;display:grid}.mgrid div{background:var(--soft);border-radius:9px;flex-direction:column;gap:2px;padding:11px 12px;display:flex}.mgrid span{color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-size:11px}.mgrid b{color:var(--ink);font-size:17px}@media (max-width:1200px){.kgrid{grid-template-columns:repeat(3,1fr)}.dgrid{grid-template-columns:1fr;grid-template-areas:"a""b""c""d""e""f"}.mgrid{grid-template-columns:repeat(2,1fr)}}
