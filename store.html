<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Loading…</title>
<meta name="description" id="m_desc" content=""/>
<meta name="keywords" id="m_keys" content=""/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="fontlink" rel="stylesheet" href="">
<style>
/* every colour/font below is a variable — populated at runtime from FontsColor / HomePageManagement */
:root{
  --serif:serif; --sans:sans-serif;
  --green:#2f5d4e; --green-d:#244a3e; --rose:#c76b73;
  --ink:#26302c; --muted:#7f867f; --line:#e9e6df; --soft:#f2efe8;
}
*{box-sizing:border-box}
body{margin:0;font-family:var(--sans);color:var(--ink);font-size:14px;background:#fff}
.wrap{max-width:1240px;margin:0 auto;padding:0 26px}
a{color:inherit;text-decoration:none;cursor:pointer}
img{max-width:100%;display:block}
.pv{background:var(--ink);color:#fff;text-align:center;font-size:12.5px;padding:7px 12px}
.pv b{color:#ffd7b0}
.strip{background:var(--green);color:#eaf2ec;text-align:center;font-size:12.5px;padding:8px}
.hdr{border-bottom:1px solid var(--line);background:#fff;position:sticky;top:0;z-index:40}
.hdr .wrap{display:flex;align-items:center;justify-content:space-between;height:84px;gap:20px}
.logo{height:58px;width:auto;cursor:pointer}
.brand{font-family:var(--serif);font-size:24px;color:var(--green);cursor:pointer}
.menu{display:flex;gap:18px;list-style:none;margin:0;padding:0;text-transform:uppercase;letter-spacing:.07em;font-size:12.5px;font-weight:500;flex-wrap:wrap}
.menu li{position:relative;padding:30px 0}
.drop{position:absolute;top:74px;left:0;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 20px 40px rgba(40,60,50,.14);padding:10px;min-width:230px;display:none;text-transform:none;letter-spacing:0;font-weight:400;z-index:50;max-height:60vh;overflow:auto}
.menu li:hover .drop{display:block}
.drop a{display:block;padding:7px 8px;border-radius:7px;font-size:13.5px}
.drop a:hover{background:var(--soft);color:var(--green)}
.icons{display:flex;gap:14px;align-items:center;white-space:nowrap}
.cart-btn{background:var(--green);color:#fff;border-radius:30px;padding:9px 16px;font-weight:500;border:none;cursor:pointer;font-family:var(--sans);font-size:13px}
.btn{display:inline-block;background:var(--rose);color:#fff;font-weight:600;font-size:13px;letter-spacing:.08em;text-transform:uppercase;padding:13px 26px;border-radius:30px;border:none;cursor:pointer;font-family:var(--sans)}
.btn:hover{background:var(--green)}
.btn.ghost{background:var(--soft);color:var(--green)}
.btn:disabled{opacity:.5;cursor:not-allowed}
/* hero from CustomWebsiteSlider */
.hero{position:relative;min-height:440px;display:flex;align-items:center;color:#fff;overflow:hidden;background:var(--green-d)}
.hero img.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.55}
.hero .scrim{position:absolute;inset:0;background:linear-gradient(90deg,rgba(20,38,32,.82),rgba(20,38,32,.25))}
.hero .wrap{position:relative;z-index:2;padding:54px 26px}
.hero h1{font-family:var(--serif);font-weight:400;font-size:50px;line-height:1.05;margin:16px 0 18px;max-width:640px}
.hero p{max-width:440px;line-height:1.8;font-size:15.5px;color:#eef4f0;margin-bottom:26px}
.eb{font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:var(--rose)}
.hero .eb{color:#ffd7b0}
.dots{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:3}
.dots i{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.45);cursor:pointer;display:block}
.dots i.on{background:#fff}
.phead{padding:22px 0 6px}
.phead h1{font-family:var(--serif);font-weight:400;font-size:36px;margin:6px 0}
.crumb{color:var(--muted);font-size:12.5px;padding:20px 0 0}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px;padding:16px 0 60px}
.card{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff;display:flex;flex-direction:column}
.card .im{aspect-ratio:1/1;background:var(--soft);overflow:hidden}
.card .im img{width:100%;height:100%;object-fit:cover}
.card .bd{padding:14px;text-align:center;display:flex;flex-direction:column;gap:8px;flex:1}
.card h4{font-family:var(--serif);font-weight:400;font-size:16px;margin:0}
.price{color:var(--green);font-weight:600}
.sel{width:100%;padding:9px;border:1px solid var(--line);border-radius:8px;font-family:var(--sans);font-size:13px;background:#fff}
.content{padding:10px 0 70px}
.card2{border:1px solid var(--line);border-radius:14px;padding:22px;background:#fff}
.row{display:flex;gap:14px;align-items:center;padding:14px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.row .th{width:92px;height:92px;border-radius:10px;overflow:hidden;background:var(--soft);flex:none}
.row .th img{width:100%;height:100%;object-fit:cover}
.row .gr{flex:1}
.qty{display:flex;align-items:center;gap:8px}
.qty button{width:30px;height:30px;border:1px solid var(--line);background:#fff;border-radius:8px;cursor:pointer;font-size:16px;line-height:1}
.qty span{min-width:26px;text-align:center;font-weight:600}
.lnk{color:var(--rose);font-size:12.5px;cursor:pointer}
.tot{display:flex;justify-content:space-between;padding:7px 0;font-size:14px}
.tot.big{font-size:19px;font-weight:600;border-top:1px solid var(--line);margin-top:8px;padding-top:14px;font-family:var(--serif)}
.two{display:grid;grid-template-columns:1.4fr .9fr;gap:26px;align-items:start}
.form{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form .full{grid-column:1/-1}
label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:5px}
input,textarea,select{width:100%;padding:11px;border:1px solid var(--line);border-radius:8px;font-family:var(--sans);font-size:14px;background:#fff}
textarea{min-height:84px;resize:vertical}
.fs{font-family:var(--serif);font-size:20px;margin-bottom:14px}
.note{background:var(--soft);border-radius:10px;padding:12px;font-size:12.5px;color:var(--muted);margin-top:12px}
.addon{display:flex;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}
.addon:last-child{border:none}
.addon input{width:auto;margin:0}
.addon .ai{width:46px;height:46px;border-radius:8px;background:var(--soft);object-fit:cover;flex:none}
.stars{color:#e0a537;letter-spacing:2px}
.rev{border-bottom:1px solid var(--line);padding:12px 0}
.rev:last-child{border:none}
.ok{background:#eef7f1;border:1px solid #cfe6d8;border-radius:14px;padding:26px}
.ok h1{font-family:var(--serif);font-weight:400;margin:8px 0}
.onum{font-family:var(--serif);font-size:30px;color:var(--green)}
.err{background:#fdeeee;border:1px solid #f3caca;color:#a33;border-radius:10px;padding:12px;margin:12px 0;font-size:13px}
.ftr{background:var(--green-d);color:#dfe9e2;margin-top:40px}
.ftr .wrap{padding:40px 26px;display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:30px}
.ftr h4{font-family:var(--serif);font-weight:400;color:#fff;font-size:19px;margin:0 0 10px}
.ftr a{display:block;padding:3px 0;color:#bccfc3}
.ftr a:hover{color:#fff}
.soc{display:flex;gap:10px;margin-top:10px}
.soc a{background:rgba(255,255,255,.1);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff}
.cp{border-top:1px solid rgba(255,255,255,.14);text-align:center;padding:16px;font-size:12.5px;color:#a9bdb1}
.load{padding:70px 0;text-align:center;color:var(--muted)}
.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);border-bottom:1px solid var(--line);padding:9px 6px}
.tbl td{padding:10px 6px;border-bottom:1px solid var(--line)}
@media(max-width:980px){.grid{grid-template-columns:repeat(2,1fr)}.two,.ftr .wrap{grid-template-columns:1fr}.menu{display:none}}
</style>
</head>
<body>
<div class="pv" id="pvbar">LIVE STOREFRONT &middot; <b>100% driven by the back office</b> &middot; branding, theme, content, add-ons, reviews, tax &amp; delivery all read from admin tables</div>
<div class="strip" id="strip"></div>

<header class="hdr"><div class="wrap">
  <div id="brandbox" onclick="go('home')"></div>
  <ul class="menu" id="menu"></ul>
  <div class="icons">
    <a class="lnk" onclick="go('lookup')">Track order</a>
    <button class="cart-btn" onclick="go('cart')">Cart &middot; <span id="badge">0</span></button>
  </div>
</div></header>

<main id="app"><div class="load">Loading store configuration from the database…</div></main>
<footer class="ftr" id="ftr"></footer>

<script>
/* ================= config ================= */
const SB   = "https://lvbewzjjubysbwnzsmfh.supabase.co";
const ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2YmV3empqdWJ5c2J3bnpzbWZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MjgxNDEsImV4cCI6MjA5OTMwNDE0MX0.bVzGWmDD74uuIsRz43zwNEMpn2VSS6n5cEjK5Xm860E";
const CO="HUDSONVILLE-49", DV="DEFAULT", DP="DEFAULT";
const H = {apikey:ANON, Authorization:"Bearer "+ANON, "Content-Type":"application/json"};
const TQ = `CompanyID=eq.${encodeURIComponent(CO)}&DivisionID=eq.${DV}&DepartmentID=eq.${DP}`;

async function api(path, opts={}){
  const r = await fetch(SB+"/rest/v1/"+path, {...opts, headers:{...H, ...(opts.headers||{})}});
  const t = await r.text();
  if(!r.ok) throw new Error(r.status+" "+t);
  return t ? JSON.parse(t) : null;
}

/* ================= state (everything from DB) ================= */
let CFG={}, COMPANY={}, HOME={}, SEO={}, THEME={}, SLIDES=[], LINKS=[], ADDONS=[], ADDONMAP=[],
    ITEMS={}, CATS=[], ASSOC=[], REVIEWS=[], CART=[], PICKED={}, LASTERR="";

const cur = () => (CFG.CurrencySymbol || COMPANY.CurrencySymbol || "$");
const money = n => cur()+Number(n||0).toFixed(2);
function sid(){
  let s = localStorage.getItem("qf_cart_sid");
  if(!s){ s="CART-"+Date.now().toString(36)+"-"+Math.random().toString(36).slice(2,8); localStorage.setItem("qf_cart_sid",s); }
  return s;
}

/* ================= load ALL back-office tables ================= */
async function loadStore(){
  const [cfg, comp, home, seo, fonts, slides, links, addons, addonmap, items, cats, assoc, revs] = await Promise.all([
    api(`StoreConfig?${TQ}&select=*`),
    api(`Companies?${TQ}&select=*`),
    api(`HomePageManagement?${TQ}&IsActive=is.true&select=*`),
    api(`SEO?${TQ}&select=*`),
    api(`FontsColor?${TQ}&select=PageID,ColorCode&order=InlineNumber`),
    api(`CustomWebsiteSlider?${TQ}&Enable=is.true&ISActiveSlider=is.true&select=*&order=rownumber`),
    api(`ContentLinks?${TQ}&ContentActive=is.true&select=*&order=SortOrder`),
    api(`AddOnItems?${TQ}&IsActive=is.true&select=*`),
    api(`Associate_AddOn_Items?${TQ}&select=*`),
    api(`InventoryItems?${TQ}&IsActive=is.true&select=ItemID,ItemName,ItemDescription,PictureURL,Price,DeluxePrice,PremiumPrice&limit=1000`),
    api(`InventoryCategories?${TQ}&select=*&order=SortOrder`),
    api(`ItemFamilyCategoryAssociation?${TQ}&select=ItemCategoryID,ItemID&limit=2000`),
    api(`InventoryItemCustomerReviews?${TQ}&Approved=is.true&select=*`)   // only APPROVED reviews
  ]);
  CFG=cfg[0]||{}; COMPANY=comp[0]||{}; HOME=home[0]||{}; SEO=seo[0]||{};
  THEME={}; fonts.forEach(f=>THEME[f.PageID]=f.ColorCode);
  SLIDES=slides; LINKS=links; ADDONS=addons; ADDONMAP=addonmap;
  ITEMS={}; items.forEach(i=>ITEMS[i.ItemID]=i);
  CATS=cats; ASSOC=assoc; REVIEWS=revs;
}
async function loadCart(){
  CART = await api(`ItemsCart?CartSessionID=eq.${sid()}&select=*&order=CartLineID`);
  document.getElementById("badge").textContent = CART.reduce((s,l)=>s+Number(l.OrderQty),0);
}

/* ================= apply admin-controlled chrome ================= */
function applyTheme(){
  const r=document.documentElement.style;
  const c=(k,f)=>THEME[k]||f;
  r.setProperty("--green",  c("primary",      HOME.Webcolor1||"#2f5d4e"));
  r.setProperty("--green-d",c("primary-dark", "#244a3e"));
  r.setProperty("--rose",   c("accent",       HOME.Webcolor2||"#c76b73"));
  r.setProperty("--ink",    c("ink","#26302c"));
  r.setProperty("--muted",  c("muted","#7f867f"));
  r.setProperty("--line",   c("line","#e9e6df"));
  r.setProperty("--soft",   c("soft","#f2efe8"));
  const head=THEME.headingFont||"Marcellus", body=THEME.bodyFont||"Jost";
  r.setProperty("--serif", `'${head}',serif`);
  r.setProperty("--sans",  `'${body}',sans-serif`);
  document.getElementById("fontlink").href =
    `https://fonts.googleapis.com/css2?family=${encodeURIComponent(head)}&family=${encodeURIComponent(body)}:wght@300;400;500;600&display=swap`;
}
function applySEO(){
  document.title = SEO.Title || COMPANY.CompanyName || "Storefront";
  document.getElementById("m_desc").content = SEO.Metatag || "";
  document.getElementById("m_keys").content = SEO.Keywords || "";
}
function applyChrome(){
  document.getElementById("strip").innerHTML =
    `${HOME.NewWebsitePhoneText||""} &middot; <b>${HOME.NewWebsitePhoneNumber||COMPANY.CompanyPhone||""}</b>`;
  const logo = COMPANY.CompanyLogoUrl;
  document.getElementById("brandbox").innerHTML = logo
    ? `<img class="logo" src="${logo}" alt="${COMPANY.CompanyName||""}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'brand',textContent:'${(COMPANY.CompanyName||'').replace(/'/g,"")}'}))">`
    : `<div class="brand">${COMPANY.CompanyName||""}</div>`;
  // menu from InventoryCategories
  const fam={}; CATS.forEach(c=>{(fam[c.ItemFamilyID]=fam[c.ItemFamilyID]||[]).push(c);});
  document.getElementById("menu").innerHTML = Object.keys(fam).map(f=>`<li>${f}
    <div class="drop">${fam[f].map(c=>`<a onclick="go('cat','${esc(c.ItemCategoryID)}')">${c.CategoryName}</a>`).join("")}</div></li>`).join("");
  // footer from ContentLinks + SEO socials + Companies
  const soc=[["f",SEO.Facebooklink],["in",SEO.instagram],["p",SEO.Pinterest],["y",SEO.yelp]].filter(s=>s[1]);
  document.getElementById("ftr").innerHTML = `<div class="wrap">
    <div><h4>${COMPANY.CompanyName||""}</h4>
      <div style="line-height:1.9">${(LINKS.find(l=>l.ContentLink==="Contact / Locate Us")||{}).ContentText||""}</div>
      <div class="soc">${soc.map(s=>`<a href="${s[1]}" target="_blank" rel="noopener">${s[0]}</a>`).join("")}</div></div>
    <div><h4>Information</h4>${LINKS.map(l=>`<a onclick="go('page',${l.ContentLinkID})">${l.ContentLink}</a>`).join("")}</div>
    <div><h4>Delivery</h4><div style="line-height:1.9">Same-day cut-off ${CFG.CutOffTime||HOME.CutOfftime||"—"}<br>
      Delivery ${money(CFG.DeliveryCharge||0)}<br>Free over ${money(CFG.FreeDeliveryOver||0)}<br>Tax ${Number(CFG.TaxPercent||0)}%</div></div>
    </div>
    <div class="cp">&copy; 2026 ${COMPANY.CompanyName||""} &middot; Powered by QuickFlora</div>`;
}
const esc = s => String(s).replace(/'/g,"\\'");
const cssId = s => String(s).replace(/[^a-zA-Z0-9_-]/g,"_");

/* ================= cart ops ================= */
async function addToCart(itemId, price, qty, desc, pic){
  const ex = CART.find(l=>l.ItemID===itemId && Number(l.ItemUnitPrice)===Number(price));
  if(ex){
    await api(`ItemsCart?CartLineID=eq.${ex.CartLineID}`,{method:"PATCH",headers:{Prefer:"return=minimal"},
      body:JSON.stringify({OrderQty:Number(ex.OrderQty)+qty})});
  } else {
    await api("ItemsCart",{method:"POST",headers:{Prefer:"return=minimal"},body:JSON.stringify({
      CompanyID:CO,DivisionID:DV,DepartmentID:DP,CartSessionID:sid(),
      ItemID:itemId, Description:desc, OrderQty:qty, ItemUnitPrice:Number(price), PictureURL:pic
    })});
  }
  await loadCart();
}
async function setQty(id,q){ if(q<1) return removeLine(id);
  await api(`ItemsCart?CartLineID=eq.${id}`,{method:"PATCH",headers:{Prefer:"return=minimal"},body:JSON.stringify({OrderQty:q})});
  await loadCart(); render(); }
async function removeLine(id){
  await api(`ItemsCart?CartLineID=eq.${id}`,{method:"DELETE",headers:{Prefer:"return=minimal"}});
  await loadCart(); render(); }
async function clearCart(){
  await api(`ItemsCart?CartSessionID=eq.${sid()}`,{method:"DELETE",headers:{Prefer:"return=minimal"}});
  await loadCart(); render(); }

/* ================= totals (tax + delivery from StoreConfig) ================= */
function totals(deliver){
  const cartSub = CART.reduce((s,l)=>s+Number(l.OrderQty)*Number(l.ItemUnitPrice),0);
  const addSub  = Object.keys(PICKED).filter(k=>PICKED[k])
                    .reduce((s,k)=>s+Number((ADDONS.find(a=>a.AddOnItemID===k)||{}).Price||0),0);
  const sub = +(cartSub+addSub).toFixed(2);
  const taxPct = Number(CFG.TaxPercent||0);
  const fee = Number(CFG.DeliveryCharge||0);
  const freeOver = Number(CFG.FreeDeliveryOver||0);
  const freight = !deliver ? 0 : (freeOver>0 && sub>=freeOver ? 0 : fee);
  const tax = +(sub*taxPct/100).toFixed(2);
  return {sub, freight, tax, taxPct, total:+(sub+freight+tax).toFixed(2), freeOver, fee};
}

/* ================= order ================= */
async function placeOrder(f){
  const t = totals(f.destination!=="Store Pickup");
  const num = "HUD-"+Date.now().toString(36).toUpperCase()+"-"+Math.random().toString(36).slice(2,5).toUpperCase();
  const now = new Date().toISOString();
  await api("OrderHeader",{method:"POST",headers:{Prefer:"return=minimal"},body:JSON.stringify({
    CompanyID:CO,DivisionID:DV,DepartmentID:DP,OrderNumber:num,OrderTypeID:"WEB",TransactionTypeID:"SO",
    OrderDate:now,SystemDate:now,OrderDueDate:f.deliveryDate?new Date(f.deliveryDate).toISOString():null,
    CustomerID:f.email||"GUEST",EmployeeID:"WEB",EnteredBy:"WEB",CurrencyID:"USD",
    Subtotal:t.sub,TaxableSubTotal:t.sub,TaxPercent:t.taxPct,TaxAmount:t.tax,
    Freight:t.freight,Handling:0,DiscountAmount:0,Total:t.total,
    ShippingName:(f.first+" "+f.last).trim(),ShippingFirstName:f.first,ShippingLastName:f.last,
    ShippingAddress1:f.addr1,ShippingAddress2:f.addr2,ShippingCity:f.city,ShippingState:f.state,
    ShippingZip:f.zip,ShippingCountry:"USA",ShippingPhone:f.phone,ShippingAttention:f.attention,
    OccasionCode:f.occasion,DestinationType:f.destination,Priority:"Standard",
    PaymentMethodID:"TEST-NO-CARD",AmountPaid:0,BalanceDue:t.total,
    HeaderMemo1:(f.cardMessage||"").slice(0,50),
    Approved:false,Printed:false,Shipped:false,Billed:false,Invoiced:false,Posted:false
  })});
  const mk=(itemId,desc,qty,unit,idx)=>{
    const sub=+(qty*unit).toFixed(2), tx=+(sub*t.taxPct/100).toFixed(2);
    return {CompanyID:CO,DivisionID:DV,DepartmentID:DP,OrderNumber:num,ItemID:itemId,Description:desc,
      OrderQty:qty,ItemUOM:"EA",ItemUnitPrice:unit,OrgItemUnitPrice:unit,SubTotal:sub,
      TaxPercent:t.taxPct,TaxAmount:tx,Total:+(sub+tx).toFixed(2),Taxable:true,CurrencyID:"USD",DiscountPerc:0,
      CardMessage:f.cardMessage,DestinationType:f.destination,
      DeliveryCharge: idx===0 ? t.freight : 0, ServiceCharge:0, ItemAddTimeStamp:now, LineId:idx+1};
  };
  const lines = CART.map((l,i)=>mk(l.ItemID,l.Description,Number(l.OrderQty),Number(l.ItemUnitPrice),i));
  Object.keys(PICKED).filter(k=>PICKED[k]).forEach(k=>{
    const a=ADDONS.find(x=>x.AddOnItemID===k);
    lines.push(mk(a.AddOnItemID, a.AddOnItemName+" (add-on)", 1, Number(a.Price), lines.length));
  });
  await api("OrderDetail",{method:"POST",headers:{Prefer:"return=minimal"},body:JSON.stringify(lines)});
  await api(`ItemsCart?CartSessionID=eq.${sid()}`,{method:"DELETE",headers:{Prefer:"return=minimal"}});
  PICKED={}; await loadCart();
  return num;
}

/* ================= routing ================= */
let ROUTE={page:"home"};
function go(p,a){ ROUTE={page:p,arg:a}; LASTERR=""; window.scrollTo(0,0); render(); }

/* ================= views ================= */
function tiles(ids){
  return `<div class="grid">${ids.map(id=>{
    const p=ITEMS[id]; if(!p) return "";
    const o=[["As shown",p.Price],["Deluxe",p.DeluxePrice],["Premium",p.PremiumPrice]].filter(x=>x[1]!=null);
    return `<div class="card">
      <div class="im" onclick="go('item','${esc(id)}')"><img loading="lazy" src="${p.PictureURL}" alt="${p.ItemName}"></div>
      <div class="bd"><h4 onclick="go('item','${esc(id)}')">${p.ItemName}</h4>
        <div class="price">${money(p.Price)}</div>
        <select class="sel" id="o_${cssId(id)}">${o.map(x=>`<option value="${x[1]}">${x[0]} — ${money(x[1])}</option>`).join("")}</select>
        <button class="btn" onclick="addCard('${esc(id)}')">Add to cart</button>
      </div></div>`;}).join("")}</div>`;
}
async function addCard(id){
  const p=ITEMS[id], s=document.getElementById("o_"+cssId(id));
  try{ await addToCart(id,Number(s.value),1,p.ItemName,p.PictureURL); toast("Added to cart"); }
  catch(e){ alert("Cart write failed: "+e.message); }
}
function toast(m){const d=document.createElement("div");d.textContent=m;
  d.style.cssText="position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:12px 22px;border-radius:30px;z-index:999;font-size:13px";
  document.body.appendChild(d);setTimeout(()=>d.remove(),1500);}

let slideIdx=0, slideTimer=null;
function vHome(){
  const s=SLIDES[slideIdx]||{};
  const feat=Object.keys(ITEMS).slice(0,8);
  return `<section class="hero">
      ${s.SliderImage1?`<img class="bg" src="${s.SliderImage1}" alt="">`:""}
      <div class="scrim"></div>
      <div class="wrap"><div class="eb">${HOME.NewWebsitePhoneText||""}</div>
        <h1>${s.SliderText1||HOME.FooterMessageHead||""}</h1>
        <p>${HOME.FooterMessage||""}</p>
        ${s.SliderLink?`<button class="btn" onclick="go('cat','${esc(s.SliderLink)}')">${s.SliderLinkName||"Shop"}</button>`:""}
      </div>
      ${SLIDES.length>1?`<div class="dots">${SLIDES.map((_,i)=>`<i class="${i===slideIdx?'on':''}" onclick="slideIdx=${i};render()"></i>`).join("")}</div>`:""}
    </section>
    <div class="wrap"><div class="phead"><div class="eb">Customer favorites</div><h1>Most Popular</h1>
      <div style="color:var(--muted)">${Object.keys(ITEMS).length} products from <b>InventoryItems</b> &middot; hero from <b>CustomWebsiteSlider</b> &middot; theme from <b>FontsColor</b></div></div>
      ${tiles(feat)}</div>`;
}
function vCat(cat){
  const ids=ASSOC.filter(a=>a.ItemCategoryID===cat).map(a=>a.ItemID);
  return `<div class="wrap"><div class="crumb"><a onclick="go('home')">Home</a> / ${cat}</div>
    <div class="phead"><div class="eb">Shop</div><h1>${cat}</h1><div style="color:var(--muted)">${ids.length} products</div></div>
    ${ids.length?tiles(ids):'<div class="load">No products in this category.</div>'}</div>`;
}
function stars(n){return "★".repeat(n)+"☆".repeat(5-n);}
function vItem(id){
  const p=ITEMS[id]; if(!p) return `<div class="wrap"><div class="load">Item not found.</div></div>`;
  const o=[["As shown",p.Price],["Deluxe",p.DeluxePrice],["Premium",p.PremiumPrice]].filter(x=>x[1]!=null);
  const rv=REVIEWS.filter(r=>r.ItemID===id);
  const avg=rv.length?(rv.reduce((s,r)=>s+r.Rating,0)/rv.length):0;
  return `<div class="wrap"><div class="crumb"><a onclick="go('home')">Home</a> / ${p.ItemName}</div>
  <div class="content two">
    <div class="card2"><img src="${p.PictureURL}" alt="${p.ItemName}" style="border-radius:10px"></div>
    <div class="card2">
      <div class="eb">Item ${p.ItemID}</div>
      <h1 style="font-family:var(--serif);font-weight:400;margin:8px 0">${p.ItemName}</h1>
      ${rv.length?`<div class="stars">${stars(Math.round(avg))} <span style="color:var(--muted);font-size:12.5px">${avg.toFixed(1)} · ${rv.length} review(s)</span></div>`:""}
      <p style="color:var(--muted)">${p.ItemDescription||""}</p>
      <label>Size / option</label>
      <select class="sel" id="o_${cssId(id)}">${o.map(x=>`<option value="${x[1]}">${x[0]} — ${money(x[1])}</option>`).join("")}</select>
      <div style="height:12px"></div>
      <label>Quantity</label><input type="number" id="qty" value="1" min="1" style="max-width:110px">
      <div style="height:16px"></div>
      <button class="btn" onclick="addDetail('${esc(id)}')">Add to cart</button>
    </div></div>
    ${rv.length?`<div class="content"><div class="card2"><div class="fs">Customer reviews
      <span style="font-size:12px;color:var(--muted)">(only Approved=true rows from InventoryItemCustomerReviews)</span></div>
      ${rv.map(r=>`<div class="rev"><div class="stars">${stars(r.Rating)}</div>
        <b>${r.ReviewBy}</b> <span style="color:var(--muted);font-size:12px">${(r.ReviewDate||"").slice(0,10)}</span>
        <div>${r.Review}</div></div>`).join("")}</div></div>`:""}
  </div>`;
}
async function addDetail(id){
  const p=ITEMS[id], s=document.getElementById("o_"+cssId(id));
  const q=Math.max(1,parseInt(document.getElementById("qty").value||"1",10));
  try{ await addToCart(id,Number(s.value),q,p.ItemName,p.PictureURL); go('cart'); }
  catch(e){ alert("Cart write failed: "+e.message); }
}
function vPage(cid){
  const l=LINKS.find(x=>String(x.ContentLinkID)===String(cid));
  if(!l) return `<div class="wrap"><div class="load">Page not found.</div></div>`;
  return `<div class="wrap"><div class="crumb"><a onclick="go('home')">Home</a> / ${l.ContentLink}</div>
    <div class="phead"><div class="eb">Information</div><h1>${l.ContentLink}</h1></div>
    <div class="content"><div class="card2">${l.ContentText||""}
      <div class="note">This page is stored in <b>ContentLinks</b> — the admin edits it, the site renders it.</div>
    </div></div></div>`;
}
function vCart(){
  if(!CART.length) return `<div class="wrap"><div class="phead"><h1>Your Cart</h1></div>
    <div class="content"><div class="card2"><p>Your cart is empty.</p>
    <button class="btn ghost" onclick="go('home')">Browse flowers</button></div></div></div>`;
  const t=totals(true);
  return `<div class="wrap"><div class="crumb"><a onclick="go('home')">Home</a> / Cart</div>
  <div class="phead"><h1>Your Cart</h1><div style="color:var(--muted)">Session <b>${sid()}</b> — held in <b>ItemsCart</b>.</div></div>
  <div class="content two">
    <div class="card2">
      ${CART.map(l=>`<div class="row">
        <div class="th"><img src="${l.PictureURL||""}" alt=""></div>
        <div class="gr"><div style="font-family:var(--serif);font-size:17px">${l.Description}</div>
          <div style="color:var(--muted);font-size:12.5px">Item ${l.ItemID} &middot; ${money(l.ItemUnitPrice)} ea</div>
          <div style="height:8px"></div>
          <div class="qty"><button onclick="setQty(${l.CartLineID},${Number(l.OrderQty)-1})">−</button>
            <span>${Number(l.OrderQty)}</span>
            <button onclick="setQty(${l.CartLineID},${Number(l.OrderQty)+1})">+</button>
            <span class="lnk" style="margin-left:12px" onclick="removeLine(${l.CartLineID})">Remove</span></div></div>
        <div style="font-weight:600">${money(Number(l.OrderQty)*Number(l.ItemUnitPrice))}</div></div>`).join("")}
      <div style="padding-top:14px"><span class="lnk" onclick="clearCart()">Clear cart</span></div>
    </div>
    <div class="card2"><div class="fs">Summary</div>
      <div class="tot"><span>Subtotal</span><span>${money(t.sub)}</span></div>
      <div class="tot"><span>Delivery${t.freight===0&&t.freeOver>0?" (free over "+money(t.freeOver)+")":""}</span><span>${money(t.freight)}</span></div>
      <div class="tot"><span>Tax (${t.taxPct}%)</span><span>${money(t.tax)}</span></div>
      <div class="tot big"><span>Total</span><span>${money(t.total)}</span></div>
      <div style="height:16px"></div>
      <button class="btn" style="width:100%" onclick="go('checkout')">Checkout</button>
      <div class="note">Tax ${t.taxPct}% and delivery ${money(t.fee)} come from <b>StoreConfig</b>, not code.</div>
    </div></div></div>`;
}
function vCheckout(){
  if(!CART.length) return `<div class="wrap"><div class="load">Cart is empty. <a class="lnk" onclick="go('home')">Shop</a></div></div>`;
  const t=totals(true);
  const tmr=new Date(Date.now()+86400000).toISOString().slice(0,10);
  return `<div class="wrap"><div class="crumb"><a onclick="go('cart')">Cart</a> / Checkout</div>
  <div class="phead"><h1>Checkout</h1></div>${LASTERR?`<div class="err">${LASTERR}</div>`:""}
  <div class="content two">
    <div class="card2"><div class="fs">Recipient &amp; delivery</div>
      <div class="form">
        <div><label>First name</label><input id="f_first" value="Amy"></div>
        <div><label>Last name</label><input id="f_last" value="Karsten"></div>
        <div class="full"><label>Delivery address</label><input id="f_addr1" value="3497 Kelly Street"></div>
        <div class="full"><label>Address 2</label><input id="f_addr2" placeholder="Apt / suite"></div>
        <div><label>City</label><input id="f_city" value="Hudsonville"></div>
        <div><label>State</label><input id="f_state" value="MI"></div>
        <div><label>ZIP</label><input id="f_zip" value="49426"></div>
        <div><label>Phone</label><input id="f_phone" value="616-669-1750"></div>
        <div><label>Delivery date</label><input type="date" id="f_date" value="${tmr}"></div>
        <div><label>Destination</label><select id="f_dest" onchange="render()">
          <option>Residence</option><option>Business</option><option>Funeral Home</option>
          <option>Hospital</option><option>Church</option><option>Store Pickup</option></select></div>
        <div><label>Occasion</label><select id="f_occ">
          ${CATS.filter(c=>c.ItemFamilyID==="Shop By Occasion").map(c=>`<option>${c.CategoryName}</option>`).join("")}
        </select></div>
        <div><label>Attention</label><input id="f_att" placeholder="Front desk"></div>
        <div class="full"><label>Card message</label><textarea id="f_msg">Thinking of you today. — The Frost family</textarea></div>
        <div class="full"><label>Your email (CustomerID)</label><input id="f_email" value="alex@quickflora.com"></div>
      </div>
      <div style="height:22px"></div>
      <div class="fs">Add a little extra <span style="font-size:12px;color:var(--muted)">(from AddOnItems)</span></div>
      ${ADDONS.map(a=>`<label class="addon" style="text-transform:none;letter-spacing:0;color:var(--ink)">
        <input type="checkbox" ${PICKED[a.AddOnItemID]?"checked":""} onchange="PICKED['${esc(a.AddOnItemID)}']=this.checked;render()">
        ${a.ItemFileName?`<img class="ai" src="${a.ItemFileName}" alt="">`:`<span class="ai"></span>`}
        <span style="flex:1"><b>${a.AddOnItemName}</b><br><span style="color:var(--muted);font-size:12.5px">${a.AddOnDescription||""}</span></span>
        <b>${money(a.Price)}</b></label>`).join("")}
      <div class="note"><b>No card data is collected or stored.</b> PaymentMethodID = TEST-NO-CARD, BalanceDue = Total. Card capture belongs in the tokenized gateway (PCI).</div>
    </div>
    <div class="card2"><div class="fs">Order summary</div>
      ${CART.map(l=>`<div class="tot"><span>${l.Description} × ${Number(l.OrderQty)}</span><span>${money(Number(l.OrderQty)*Number(l.ItemUnitPrice))}</span></div>`).join("")}
      ${Object.keys(PICKED).filter(k=>PICKED[k]).map(k=>{const a=ADDONS.find(x=>x.AddOnItemID===k);
        return `<div class="tot"><span>+ ${a.AddOnItemName}</span><span>${money(a.Price)}</span></div>`;}).join("")}
      <div class="tot" style="border-top:1px solid var(--line);margin-top:6px;padding-top:10px"><span>Subtotal</span><span>${money(t.sub)}</span></div>
      <div class="tot"><span>Delivery</span><span>${money(t.freight)}</span></div>
      <div class="tot"><span>Tax (${t.taxPct}%)</span><span>${money(t.tax)}</span></div>
      <div class="tot big"><span>Total</span><span>${money(t.total)}</span></div>
      <div style="height:16px"></div>
      <button class="btn" id="placeBtn" style="width:100%" onclick="submitOrder()">Place order</button>
    </div></div></div>`;
}
const val=id=>(document.getElementById(id)||{}).value||"";
async function submitOrder(){
  const b=document.getElementById("placeBtn"); b.disabled=true; b.textContent="Writing to database…";
  try{
    const n=await placeOrder({first:val("f_first"),last:val("f_last"),addr1:val("f_addr1"),addr2:val("f_addr2"),
      city:val("f_city"),state:val("f_state"),zip:val("f_zip"),phone:val("f_phone"),deliveryDate:val("f_date"),
      destination:val("f_dest"),occasion:val("f_occ"),attention:val("f_att"),cardMessage:val("f_msg"),email:val("f_email")});
    go("done",n);
  }catch(e){ LASTERR="Order failed: "+e.message; b.disabled=false; b.textContent="Place order"; render(); }
}
function vDone(n){
  return `<div class="wrap"><div class="content"><div class="ok">
    <div class="eb">Order confirmed &amp; saved</div><h1>Thank you!</h1>
    <div class="onum">${n}</div>
    <p style="color:var(--muted)">Written to <b>OrderHeader</b> + <b>OrderDetail</b>; <b>ItemsCart</b> emptied.</p>
    <button class="btn" onclick="go('lookup','${n}')">Look it up in the database</button>
    <button class="btn ghost" onclick="go('home')">Keep shopping</button>
  </div></div></div>`;
}
function vLookup(pref){
  return `<div class="wrap"><div class="phead"><div class="eb">Verification</div><h1>Track / verify order</h1></div>
    <div class="content"><div class="card2">
      <div class="form"><div class="full"><label>Order number</label><input id="lk" value="${pref||""}" placeholder="HUD-…"></div></div>
      <div style="height:12px"></div><button class="btn" onclick="doLookup()">Fetch from database</button>
      <div id="lkout"></div></div></div></div>`;
}
async function doLookup(){
  const n=val("lk").trim(), out=document.getElementById("lkout");
  if(!n){out.innerHTML='<div class="err">Enter an order number.</div>';return;}
  out.innerHTML='<div class="load">Querying…</div>';
  try{
    const h=await api(`OrderHeader?OrderNumber=eq.${encodeURIComponent(n)}&select=*`);
    if(!h.length){out.innerHTML='<div class="err">No such order.</div>';return;}
    const d=await api(`OrderDetail?OrderNumber=eq.${encodeURIComponent(n)}&select=*&order=LineId`);
    const o=h[0];
    out.innerHTML=`<div style="height:18px"></div><div class="fs">OrderHeader</div>
      <table class="tbl"><tbody>${[["OrderNumber",o.OrderNumber],["OrderDate",o.OrderDate],
        ["ShippingName",o.ShippingName],["Address",[o.ShippingAddress1,o.ShippingCity,o.ShippingState,o.ShippingZip].filter(Boolean).join(", ")],
        ["OccasionCode",o.OccasionCode],["Subtotal",money(o.Subtotal)],["Freight",money(o.Freight)],
        ["TaxPercent",o.TaxPercent+"%"],["TaxAmount",money(o.TaxAmount)],["Total",money(o.Total)],
        ["PaymentMethodID",o.PaymentMethodID],["HeaderMemo1",o.HeaderMemo1]]
        .map(r=>`<tr><th style="width:180px">${r[0]}</th><td>${r[1]??""}</td></tr>`).join("")}</tbody></table>
      <div style="height:20px"></div><div class="fs">OrderDetail (${d.length} lines)</div>
      <table class="tbl"><thead><tr><th>Line</th><th>ItemID</th><th>Description</th><th>Qty</th><th>Unit</th><th>Total</th></tr></thead>
      <tbody>${d.map(l=>`<tr><td>${l.LineId}</td><td>${l.ItemID}</td><td>${l.Description}</td>
        <td>${Number(l.OrderQty)}</td><td>${money(l.ItemUnitPrice)}</td><td>${money(l.Total)}</td></tr>`).join("")}</tbody></table>`;
  }catch(e){ out.innerHTML='<div class="err">'+e.message+'</div>'; }
}

/* ================= render ================= */
function render(){
  const p=ROUTE.page, a=document.getElementById("app");
  a.innerHTML = p==="home"?vHome() : p==="cat"?vCat(ROUTE.arg) : p==="item"?vItem(ROUTE.arg)
    : p==="page"?vPage(ROUTE.arg) : p==="cart"?vCart() : p==="checkout"?vCheckout()
    : p==="done"?vDone(ROUTE.arg) : p==="lookup"?vLookup(ROUTE.arg) : vHome();
  if(p==="home" && SLIDES.length>1){
    clearInterval(slideTimer);
    slideTimer=setInterval(()=>{ if(ROUTE.page!=="home"){clearInterval(slideTimer);return;}
      slideIdx=(slideIdx+1)%SLIDES.length; render(); }, 6000);
  }
}
(async function(){
  try{
    await loadStore();
    applyTheme(); applySEO(); applyChrome();
    await loadCart();
    render();
  }catch(e){
    document.getElementById("app").innerHTML='<div class="wrap"><div class="err">Could not load store config: '+e.message+'</div></div>';
  }
})();
</script>
</body>
</html>
