<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Loading…</title>
<meta name="description" id="m_desc" content=""/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link id="fontlink" rel="stylesheet" href="">
<style>
:root{--serif:serif;--sans:sans-serif;--green:#2f5d4e;--green-d:#244a3e;--rose:#c76b73;
      --ink:#26302c;--muted:#7f867f;--line:#e9e6df;--soft:#f2efe8}
*{box-sizing:border-box}
body{margin:0;font-family:var(--sans);color:var(--ink);font-size:14px;background:#fff}
.wrap{max-width:1240px;margin:0 auto;padding:0 26px}
a{color:inherit;text-decoration:none;cursor:pointer}
img{max-width:100%;display:block}
.pv{background:var(--ink);color:#fff;text-align:center;font-size:12.5px;padding:7px 12px}
.pv b{color:#ffd7b0}
.strip{background:var(--green);color:#eaf2ec;text-align:center;font-size:12.5px;padding:8px}
.hdr{border-bottom:1px solid var(--line);background:#fff;position:sticky;top:0;z-index:40}
.hdr .wrap{display:flex;align-items:center;justify-content:space-between;height:84px;gap:20px}
.logo{height:58px;cursor:pointer}
.brand{font-family:var(--serif);font-size:24px;color:var(--green);cursor:pointer}
.menu{display:flex;gap:18px;list-style:none;margin:0;padding:0;text-transform:uppercase;letter-spacing:.07em;font-size:12.5px;font-weight:500;flex-wrap:wrap}
.menu li{position:relative;padding:30px 0}
.drop{position:absolute;top:74px;left:0;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 20px 40px rgba(40,60,50,.14);padding:10px;min-width:230px;display:none;text-transform:none;letter-spacing:0;font-weight:400;z-index:50;max-height:60vh;overflow:auto}
.menu li:hover .drop{display:block}
.drop a{display:block;padding:7px 8px;border-radius:7px;font-size:13.5px}
.drop a:hover{background:var(--soft);color:var(--green)}
.icons{display:flex;gap:14px;align-items:center;white-space:nowrap}
.cart-btn{background:var(--green);color:#fff;border-radius:30px;padding:9px 16px;font-weight:500;border:none;cursor:pointer;font-family:var(--sans);font-size:13px}
.btn{display:inline-block;background:var(--rose);color:#fff;font-weight:600;font-size:13px;letter-spacing:.08em;text-transform:uppercase;padding:13px 26px;border-radius:30px;border:none;cursor:pointer;font-family:var(--sans)}
.btn:hover{background:var(--green)}
.btn.ghost{background:var(--soft);color:var(--green)}
.btn.sm{padding:9px 16px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}
.hero{position:relative;min-height:440px;display:flex;align-items:center;color:#fff;overflow:hidden;background:var(--green-d)}
.hero img.bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.55}
.hero .scrim{position:absolute;inset:0;background:linear-gradient(90deg,rgba(20,38,32,.82),rgba(20,38,32,.25))}
.hero .wrap{position:relative;z-index:2;padding:54px 26px}
.hero h1{font-family:var(--serif);font-weight:400;font-size:50px;line-height:1.05;margin:16px 0 18px;max-width:640px}
.hero p{max-width:440px;line-height:1.8;font-size:15.5px;color:#eef4f0;margin-bottom:26px}
.eb{font-size:12px;letter-spacing:.26em;text-transform:uppercase;color:var(--rose)}
.hero .eb{color:#ffd7b0}
.occ{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;padding:44px 0 6px}
.otile{border-radius:14px;min-height:170px;position:relative;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;justify-content:flex-end;padding:16px;color:#fff}
.otile img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.otile:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.62))}
.otile span,.otile h4{position:relative;z-index:2}
.otile span{font-size:11px;letter-spacing:.12em;text-transform:uppercase}
.otile h4{font-family:var(--serif);font-weight:400;font-size:22px;margin:3px 0 0}
.phead{padding:22px 0 6px}
.phead h1{font-family:var(--serif);font-weight:400;font-size:36px;margin:6px 0}
.crumb{color:var(--muted);font-size:12.5px;padding:20px 0 0}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px;padding:16px 0 60px}
.card{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:#fff;display:flex;flex-direction:column}
.card .im{aspect-ratio:1/1;background:var(--soft);overflow:hidden}
.card .im img{width:100%;height:100%;object-fit:cover}
.card .bd{padding:14px;text-align:center;display:flex;flex-direction:column;gap:8px;flex:1}
.card h4{font-family:var(--serif);font-weight:400;font-size:16px;margin:0}
.price{color:var(--green);font-weight:600}
.sel{width:100%;padding:9px;border:1px solid var(--line);border-radius:8px;font-family:var(--sans);font-size:13px;background:#fff}
.content{padding:10px 0 70px}
.card2{border:1px solid var(--line);border-radius:14px;padding:22px;background:#fff}
.row{display:flex;gap:14px;align-items:center;padding:14px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.row .th{width:92px;height:92px;border-radius:10px;overflow:hidden;background:var(--soft);flex:none}
.row .th img{width:100%;height:100%;object-fit:cover}
.row .gr{flex:1}
.qty{display:flex;align-items:center;gap:8px}
.qty button{width:30px;height:30px;border:1px solid var(--line);background:#fff;border-radius:8px;cursor:pointer;font-size:16px}
.qty span{min-width:26px;text-align:center;font-weight:600}
.lnk{color:var(--rose);font-size:12.5px;cursor:pointer}
.tot{display:flex;justify-content:space-between;padding:7px 0;font-size:14px}
.tot.big{font-size:19px;font-weight:600;border-top:1px solid var(--line);margin-top:8px;padding-top:14px;font-family:var(--serif)}
.tot.disc{color:var(--green)}
.two{display:grid;grid-template-columns:1.4fr .9fr;gap:26px;align-items:start}
.form{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form .full{grid-column:1/-1}
label{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:5px}
input,textarea,select{width:100%;padding:11px;border:1px solid var(--line);border-radius:8px;font-family:var(--sans);font-size:14px;background:#fff}
textarea{min-height:80px}
.fs{font-family:var(--serif);font-size:20px;margin-bottom:14px}
.note{background:var(--soft);border-radius:10px;padding:12px;font-size:12.5px;color:var(--muted);margin-top:12px}
.addon,.ship{display:flex;gap:12px;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}
.addon:last-child,.ship:last-child{border:none}
.addon input,.ship input{width:auto;margin:0}
.addon .ai{width:46px;height:46px;border-radius:8px;background:var(--soft);object-fit:cover;flex:none}
.stars{color:#e0a537;letter-spacing:2px}
.rev{border-bottom:1px solid var(--line);padding:12px 0}
.ok{background:#eef7f1;border:1px solid #cfe6d8;border-radius:14px;padding:26px}
.ok h1{font-family:var(--serif);font-weight:400;margin:8px 0}
.onum{font-family:var(--serif);font-size:30px;color:var(--green)}
.err{background:#fdeeee;border:1px solid #f3caca;color:#a33;border-radius:10px;padding:12px;margin:10px 0;font-size:13px}
.okmsg{background:#eef7f1;border:1px solid #cfe6d8;color:#256b4d;border-radius:10px;padding:12px;margin:10px 0;font-size:13px}
.pend{background:#fff8e6;border:1px solid #f0dfae;color:#8a6d1f;border-radius:10px;padding:12px;margin:10px 0;font-size:13px}
.inline{display:flex;gap:8px}
.inline input{flex:1}
.ftr{background:var(--green-d);color:#dfe9e2;margin-top:40px}
.ftr .wrap{padding:40px 26px;display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:30px}
.ftr h4{font-family:var(--serif);font-weight:400;color:#fff;font-size:19px;margin:0 0 10px}
.ftr a{display:block;padding:3px 0;color:#bccfc3}
.cp{border-top:1px solid rgba(255,255,255,.14);text-align:center;padding:16px;font-size:12.5px;color:#a9bdb1}
.load{padding:70px 0;text-align:center;color:var(--muted)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-size:11px;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line);padding:8px 6px}
.tbl td{padding:9px 6px;border-bottom:1px solid var(--line)}
@media(max-width:980px){.grid,.occ{grid-template-columns:repeat(2,1fr)}.two,.ftr .wrap{grid-template-columns:1fr}.menu{display:none}}
</style>
</head>
<body>
<div class="pv">LIVE STOREFRONT &middot; <b>full back-office parity</b> &middot; tax groups, per-ZIP delivery, coupons, gift cards &amp; orders all enforced server-side</div>
<div class="strip" id="strip"></div>
<header class="hdr"><div class="wrap">
  <div id="brandbox" onclick="go('home')"></div>
  <ul class="menu" id="menu"></ul>
  <div class="icons">
    <a class="lnk" onclick="go('lookup')">Track order</a>
    <a class="lnk" id="acctlink" onclick="go(AUTH?'account':'signin')">Sign in</a>
    <button class="cart-btn" onclick="go('cart')">Cart &middot; <span id="badge">0</span></button>
  </div>
</div></header>
<main id="app"><div class="load">Loading store configuration…</div></main>
<footer class="ftr" id="ftr"></footer>

<script>
const SB="https://lvbewzjjubysbwnzsmfh.supabase.co";
const ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx2YmV3empqdWJ5c2J3bnpzbWZoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MjgxNDEsImV4cCI6MjA5OTMwNDE0MX0.bVzGWmDD74uuIsRz43zwNEMpn2VSS6n5cEjK5Xm860E";
const CO="HUDSONVILLE-49",DV="DEFAULT",DP="DEFAULT";
const H={apikey:ANON,Authorization:"Bearer "+ANON,"Content-Type":"application/json"};
const TQ=`CompanyID=eq.${encodeURIComponent(CO)}&DivisionID=eq.${DV}&DepartmentID=eq.${DP}`;
async function api(p,o={}){const r=await fetch(SB+"/rest/v1/"+p,{...o,headers:{...H,...(o.headers||{})}});
  const t=await r.text(); if(!r.ok) throw new Error(r.status+" "+t); return t?JSON.parse(t):null;}
async function rpc(fn,args){return api("rpc/"+fn,{method:"POST",body:JSON.stringify(args)});}

/* ================= CUSTOMER ACCOUNTS =================
   Auth is handled by Supabase Auth (passwords hashed there).
   The production CustomerInformation.CustomerPassword column is cleartext (P1)
   and is deliberately NOT replicated or written to here. */
let AUTH=null, PROFILE=null, ADDRESSES=[], MYORDERS=[], WISH=[], LOYALTY=null, AUTHERR="";
/* Legacy QuickFlora has no OrderStatus column — status is the OrderHeader bit flags. */
function ostat(o){ return o.Billed?"BILLED":o.Shipped?"SHIPPED":o.Printed?"PRINTED":o.Approved?"APPROVED":"NEW"; }
/* Checkout form state. Held OUTSIDE the DOM so a re-render (applying a coupon, re-quoting
   delivery) never wipes what the customer has typed. */
let FORM={first:"Amy",last:"Karsten",addr1:"3497 Kelly Street",city:"Hudsonville",state:"MI",
          zip:"49426",phone:"616-669-1750",date:"",occ:"",msg:"Thinking of you today. — The Frost family",
          email:"alex@quickflora.com"};
/* hardened checkout state */
let PAYSIM="ok";        // which test card the hosted field simulates
let AUTHZ=null;         // gateway authorisation (token-based; no card data)
let IDEM=null;          // idempotency key for the current checkout attempt
let SUBMITTING=false;   // client-side double-submit guard
const CUSTID = () => (AUTH && AUTH.email) ? AUTH.email : "GUEST";
function saveAuth(a){AUTH=a; a?localStorage.setItem("qf_auth",JSON.stringify(a)):localStorage.removeItem("qf_auth");}
function loadAuth(){try{AUTH=JSON.parse(localStorage.getItem("qf_auth")||"null");}catch(e){AUTH=null;}}

async function doRegister(){
  AUTHERR="";
  const body={email:val("a_email").trim(),password:val("a_pass"),
              first:val("a_first").trim(),last:val("a_last").trim(),phone:val("a_phone").trim()};
  const r=await (await fetch(SB+"/functions/v1/register",{method:"POST",
    headers:{apikey:ANON,"Content-Type":"application/json"},body:JSON.stringify(body)})).json();
  if(!r.ok){AUTHERR=r.error;return render();}
  await doLogin(body.email, body.password);
}
async function doLogin(email,password){
  AUTHERR="";
  email = email || val("a_email").trim(); password = password || val("a_pass");
  const t=await (await fetch(SB+"/auth/v1/token?grant_type=password",{method:"POST",
    headers:{apikey:ANON,"Content-Type":"application/json"},
    body:JSON.stringify({email,password})})).json();
  if(!t.access_token){AUTHERR=t.error_description||t.msg||"Email or password is incorrect.";return render();}
  saveAuth({email:t.user.email,token:t.access_token,uid:t.user.id});
  // real QuickFlora table: session -> customer mapping
  await api("CartLoginLogout",{method:"POST",headers:{Prefer:"return=minimal"},body:JSON.stringify({
    SessionBrowserID:sid(),LoginLogOutValue:"LOGIN",CustomerID:AUTH.email,
    CustomerName:AUTH.email,CompanyWebURL:COMPANY.CompanyWebAddress||""})});
  await loadAccount();
  go("account");
}
async function doLogout(){
  if(AUTH) await api("CartLoginLogout",{method:"POST",headers:{Prefer:"return=minimal"},body:JSON.stringify({
    SessionBrowserID:sid(),LoginLogOutValue:"LOGOUT",CustomerID:AUTH.email,CustomerName:AUTH.email})});
  saveAuth(null); PROFILE=null; ADDRESSES=[]; MYORDERS=[]; WISH=[]; LOYALTY=null;
  applyChrome(); go("home");
}
async function loadAccount(){
  if(!AUTH) return;
  const c=CUSTID();
  const [p,a,o,w,l]=await Promise.all([
    api(`CustomerInformation?${TQ}&CustomerID=eq.${encodeURIComponent(c)}&select=*`),
    api(`CustomerShipToLocations?${TQ}&CustomerID=eq.${encodeURIComponent(c)}&select=*`),
    api(`OrderHeader?${TQ}&CustomerID=eq.${encodeURIComponent(c)}&select=*&order=OrderDate.desc`),
    api(`InventoryWishList?${TQ}&CustomerID=eq.${encodeURIComponent(c)}&select=*`),
    Promise.resolve({enabled:false,Points:0,Value:0})   // loyalty is out of scope for now
  ]);
  PROFILE=p[0]||null; ADDRESSES=a; MYORDERS=o; WISH=w; LOYALTY=l;
  applyChrome();
}
async function saveProfile(){
  await api(`CustomerInformation?${TQ}&CustomerID=eq.${encodeURIComponent(CUSTID())}`,
    {method:"PATCH",headers:{Prefer:"return=minimal"},body:JSON.stringify({
      CustomerFirstName:val("p_first"),CustomerLastName:val("p_last"),
      CustomerPhone:val("p_phone"),CustomerAddress1:val("p_addr1"),
      CustomerCity:val("p_city"),CustomerState:val("p_state"),CustomerZip:val("p_zip")})});
  await loadAccount(); toast("Profile saved"); render();
}
async function saveAddress(){
  const r=await rpc("fn_save_shipto",{p_co:CO,p_dv:DV,p_dp:DP,p_customer:CUSTID(),p_addr:{
    ShipToName:val("s_name"),ShipToAddress1:val("s_addr1"),ShipToCity:val("s_city"),
    ShipToState:val("s_state"),ShipToZip:val("s_zip"),ShipToPhone:val("s_phone")}});
  if(!r.ok) return alert(r.error);
  await loadAccount(); toast("Address saved"); render();
}
async function delAddress(id){
  await api(`CustomerShipToLocations?id=eq.${id}`,{method:"DELETE",headers:{Prefer:"return=minimal"}});
  await loadAccount(); render();
}
async function toggleWish(itemId){
  if(!AUTH){go("signin");return;}
  const ex=WISH.find(w=>w.ItemID===itemId);
  if(ex) await api(`InventoryWishList?id=eq.${ex.id}`,{method:"DELETE",headers:{Prefer:"return=minimal"}});
  else await api("InventoryWishList",{method:"POST",headers:{Prefer:"return=minimal"},body:JSON.stringify({
    CompanyID:CO,DivisionID:DV,DepartmentID:DP,ItemID:itemId,CustomerID:CUSTID(),WishQuantity:1})});
  await loadAccount(); toast(ex?"Removed from wishlist":"Saved to wishlist"); render();
}
function useAddress(i){
  const a=ADDRESSES[i];
  const set=(id,v)=>{const e=document.getElementById(id); if(e) e.value=v||"";};
  set("f_first",(a.ShipToName||"").split(" ")[0]); set("f_last",(a.ShipToName||"").split(" ").slice(1).join(" "));
  set("f_addr1",a.ShipToAddress1); set("f_city",a.ShipToCity); set("f_state",a.ShipToState);
  set("f_zip",a.ShipToZip); set("f_phone",a.ShipToPhone);
  refreshQuote();
}

let COMPANY={},HOME={},SEO={},THEME={},SLIDES=[],TILES=[],LINKS=[],ADDONS=[],ADDONMAP=[],
    ITEMS={},CATS=[],ASSOC=[],REVIEWS=[],OCCASIONS=[],SHIPS=[],CART=[],PICKED={},
    SHIPID="",QUOTE=null,COUPON=null,GIFT=null,LASTERR="",PENDING="",CPNMSG="",GCMSG="";

const money=n=>"$"+Number(n||0).toFixed(2);
const esc=s=>String(s==null?"":s).replace(/'/g,"\\'");
const cssId=s=>String(s).replace(/[^a-zA-Z0-9_-]/g,"_");
const val=id=>(document.getElementById(id)||{}).value||"";
function sid(){let s=localStorage.getItem("qf_cart_sid");
  if(!s){s="CART-"+Date.now().toString(36)+"-"+Math.random().toString(36).slice(2,8);localStorage.setItem("qf_cart_sid",s);}return s;}

async function loadStore(){
  const [comp,home,seo,fonts,slides,tiles,links,addons,amap,items,cats,assoc,revs,occ,ships]=await Promise.all([
    api(`Companies?${TQ}&select=*`), api(`HomePageManagement?${TQ}&IsActive=is.true&select=*`),
    api(`SEO?${TQ}&select=*`), api(`FontsColor?${TQ}&select=PageID,ColorCode&order=InlineNumber`),
    api(`CustomWebsiteSlider?${TQ}&Enable=is.true&select=*&order=rownumber`),
    api(`CustomWebsiteSliderImagesList?${TQ}&select=*&order=rownumber`),
    api(`ContentLinks?${TQ}&ContentActive=is.true&select=*&order=SortOrder`),
    api(`AddOnItems?${TQ}&IsActive=is.true&select=*`),
    api(`Associate_AddOn_Items?${TQ}&select=*&limit=2000`),
    api(`InventoryItems?${TQ}&IsActive=is.true&select=ItemID,ItemName,ItemDescription,PictureURL,Price,DeluxePrice,PremiumPrice&limit=1000`),
    api(`InventoryCategories?${TQ}&select=*&order=SortOrder`),
    api(`ItemFamilyCategoryAssociation?${TQ}&select=ItemCategoryID,ItemID&limit=2000`),
    api(`InventoryItemCustomerReviews?${TQ}&Approved=is.true&select=*`),
    api(`Occasion?${TQ}&select=*&order=OccasionID`),
    api(`ShipmentMethods?${TQ}&select=*`)
  ]);
  COMPANY=comp[0]||{};HOME=home[0]||{};SEO=seo[0]||{};
  THEME={};fonts.forEach(f=>THEME[f.PageID]=f.ColorCode);
  SLIDES=slides;TILES=tiles.filter(t=>t.SliderImageName);LINKS=links;ADDONS=addons;ADDONMAP=amap;
  ITEMS={};items.forEach(i=>ITEMS[i.ItemID]=i);
  CATS=cats;ASSOC=assoc;REVIEWS=revs;OCCASIONS=occ;SHIPS=ships;
  if(!SHIPID) SHIPID=(ships.find(s=>s.ShipMethodID!=='PICKUP')||ships[0]||{}).ShipMethodID||"";
}
/* Cart = the legacy QuickFlora tables: CartItems (lines) -> CartItemsDetails + CartDetails (checkout header).
   Legacy column names throughout: RowID / ItemName / Quantity / Price / CartRefID. */
async function loadCart(){
  CART=await api(`CartItems?CartRefID=eq.${sid()}&select=*&order=RowID`);
  document.getElementById("badge").textContent=CART.reduce((s,l)=>s+Number(l.Quantity),0);
}
function applyTheme(){
  const r=document.documentElement.style,c=(k,f)=>THEME[k]||f;
  r.setProperty("--green",c("primary",HOME.Webcolor1||"#2f5d4e"));
  r.setProperty("--green-d",c("primary-dark","#244a3e"));
  r.setProperty("--rose",c("accent",HOME.Webcolor2||"#c76b73"));
  r.setProperty("--ink",c("ink","#26302c"));r.setProperty("--muted",c("muted","#7f867f"));
  r.setProperty("--line",c("line","#e9e6df"));r.setProperty("--soft",c("soft","#f2efe8"));
  const hd=THEME.headingFont||"Marcellus",bd=THEME.bodyFont||"Jost";
  r.setProperty("--serif",`'${hd}',serif`);r.setProperty("--sans",`'${bd}',sans-serif`);
  document.getElementById("fontlink").href=
    `https://fonts.googleapis.com/css2?family=${encodeURIComponent(hd)}&family=${encodeURIComponent(bd)}:wght@300;400;500;600&display=swap`;
}
function applyChrome(){
  document.title=SEO.Title||COMPANY.CompanyName||"Storefront";
  document.getElementById("m_desc").content=SEO.Metatag||"";
  document.getElementById("strip").innerHTML=`${HOME.NewWebsitePhoneText||""} &middot; <b>${HOME.NewWebsitePhoneNumber||COMPANY.CompanyPhone||""}</b>`;
  document.getElementById("brandbox").innerHTML=COMPANY.CompanyLogoUrl
    ? `<img class="logo" src="${COMPANY.CompanyLogoUrl}" alt="">` : `<div class="brand">${COMPANY.CompanyName||""}</div>`;
  const fam={};CATS.forEach(c=>{(fam[c.ItemFamilyID]=fam[c.ItemFamilyID]||[]).push(c);});
  document.getElementById("menu").innerHTML=Object.keys(fam).map(f=>`<li>${f}
    <div class="drop">${fam[f].map(c=>`<a onclick="go('cat','${esc(c.ItemCategoryID)}')">${c.CategoryName}</a>`).join("")}</div></li>`).join("");
  const soc=[["f",SEO.Facebooklink],["in",SEO.instagram],["p",SEO.Pinterest],["y",SEO.yelp]].filter(s=>s[1]);
  document.getElementById("ftr").innerHTML=`<div class="wrap">
    <div><h4>${COMPANY.CompanyName||""}</h4>
      <div style="line-height:1.9">${(LINKS.find(l=>l.ContentLink==="Contact / Locate Us")||{}).ContentText||""}</div></div>
    <div><h4>Information</h4>${LINKS.map(l=>`<a onclick="go('page',${l.ContentLinkID})">${l.ContentLink}</a>`).join("")}</div>
    <div><h4>Delivery</h4><div style="line-height:1.9">${SHIPS.map(s=>s.ShipMethodDescription).join("<br>")}<br>
      Rates &amp; cut-off vary by ZIP</div></div></div>

  const ok=new Set(ADDONMAP.filter(m=>c.has(m.ItemCategoryID)).map(m=>m.AddOnItemID));
  return ADDONS.filter(a=>ok.has(a.AddOnItemID));}

async function addToCart(id,price,qty,desc,pic){
  const ex=CART.find(l=>l.ItemID===id&&Number(l.Price)===Number(price));
  if(ex) await api(`CartItems?RowID=eq.${ex.RowID}`,{method:"PATCH",headers:{Prefer:"return=minimal"},
    body:JSON.stringify({Quantity:Number(ex.Quantity)+qty,Total:(Number(ex.Quantity)+qty)*Number(price)})});
  else await api("CartItems",{method:"POST",headers:{Prefer:"return=minimal"},body:JSON.stringify({
    CompanyID:CO,DivisionID:DV,DepartmentID:DP,
    CustomerID:CUSTID(), CartRefID:sid(),          // legacy keys the cart by CustomerID; CartRefID = browser session
    ItemID:id, ItemName:String(desc||"").slice(0,50),
    Quantity:qty, Price:Number(price), ItemFullPrice:Number(price),
    Total:qty*Number(price), PictureURL:String(pic||"").slice(0,80),
    CurrencyID:"USD", locktimestamp:new Date().toISOString()})});

}

/* ---------- totals (client preview; server re-computes authoritatively) ---------- */
function goodsSubtotal(){
  const elig=eligibleAddons();
  const cart=CART.reduce((s,l)=>s+Number(l.Quantity)*Number(l.Price),0);
  const add=Object.keys(PICKED).filter(k=>PICKED[k]&&elig.some(a=>a.AddOnItemID===k))
             .reduce((s,k)=>s+Number((ADDONS.find(a=>a.AddOnItemID===k)||{}).Price||0),0);
  return +(cart+add).toFixed(2);
}
let TAXCALC={TaxTotal:0,Lines:[]};
function baseFigures(){
  const sub=goodsSubtotal();
  const disc=COUPON&&COUPON.valid?Number(COUPON.Discount):0;
  const pickup=(SHIPID==='PICKUP');
  const freight=pickup?0:(QUOTE&&QUOTE.serviceable?Number(QUOTE.rate||0):0);
  const service=pickup?0:(QUOTE&&QUOTE.serviceable?Number(QUOTE.ServiceCharge||0):0);
  const taxbase=+((sub-disc)
    + ((QUOTE&&QUOTE.DeliveryTaxable)?freight:0)
    + ((QUOTE&&QUOTE.ServiceTaxable)?service:0)).toFixed(2);
  return {sub,disc,freight,service,taxbase,pickup};
}
/* tax comes from the SAME TaxGroup engine the server uses — not a hardcoded rate,
   so an admin changing the tax group is reflected in the checkout preview too. */
async function recalcTax(){
  const b=baseFigures();
  TAXCALC=await rpc("fn_calc_tax",{p_co:CO,p_dv:DV,p_dp:DP,p_group:"MI-STD",p_amount:b.taxbase});
}
function preview(){
  const b=baseFigures();
  const tax=+Number(TAXCALC.TaxTotal||0).toFixed(2);
  const total=+(b.sub-b.disc+b.freight+b.service+tax).toFixed(2);
  const gc=GIFT&&GIFT.valid?Math.min(Number(GIFT.Balance),total):0;
  return {...b,tax,taxLines:TAXCALC.Lines||[],total,gc,due:+(total-gc).toFixed(2)};
}
async function refreshQuote(){
  const zip=(FORM.zip||"").trim(), date=FORM.date;
  if(SHIPID==='PICKUP'){QUOTE={serviceable:true,rate:0,rate_basis:'Store Pickup'};}
  else if(zip.length<5||!date){QUOTE=null;}
  else QUOTE=await rpc("fn_quote_delivery",{p_co:CO,p_dv:DV,p_dp:DP,p_zip:zip,p_date:date});
  await recalcTax(); render();
}
async function applyCoupon(){
  const code=val("f_cpn").trim();

  else{
    COUPON=await rpc("fn_validate_coupon",{p_co:CO,p_dv:DV,p_dp:DP,p_code:code,
                      p_subtotal:goodsSubtotal(),p_date:FORM.date||new Date().toISOString().slice(0,10)});
    CPNMSG=COUPON.valid?`Coupon ${COUPON.CouponCode} applied — ${COUPON.description}.`:COUPON.reason;
  }

}

}

async function submitOrder(){
  const b=document.getElementById("placeBtn");
  if(SUBMITTING) return;                       // client-side guard
  SUBMITTING=true; b.disabled=true; b.textContent="Placing order…";
  try{
    const t=preview();

    /* 1. AUTHORISE FIRST. A declined card must never produce an order row. */
    if(t.due>0 && !AUTHZ){
      b.textContent="Authorising card…";
      const token = (PAYSIM==="decline")
        ? "tok_decline_"+Math.random().toString(36).slice(2,10)   // hosted field would return this
        : "tok_test_"  +Math.random().toString(36).slice(2,10);
      const az=await rpc("fn_authorize_payment",{p_co:CO,p_dv:DV,p_dp:DP,p_session:sid(),
        p_amount:t.due,p_token:token,p_brand:"VISA",p_last4:"4242"});
      if(!az.ok){LASTERR=az.reason;SUBMITTING=false;b.disabled=false;b.textContent="Place order";return render();}
      AUTHZ=az;
    }

    /* 2. Place the order against the authorisation. */
    b.textContent="Placing order…";
    const res=await rpc("fn_place_order",{
      p_co:CO,p_dv:DV,p_dp:DP,p_session:sid(),
      p_cust:{first:FORM.first,last:FORM.last,addr1:FORM.addr1,city:FORM.city,
              state:FORM.state,zip:FORM.zip,phone:FORM.phone,email:AUTH?AUTH.email:FORM.email},
      p_date:FORM.date,p_occasion:FORM.occ||val("f_occ"),p_shipmethod:SHIPID,p_dest:'Residence',
      p_coupon:(COUPON&&COUPON.valid)?COUPON.CouponCode:null,
      p_giftcard:(GIFT&&GIFT.valid)?GIFT.GiftCardNumber:null,
      p_cardmessage:FORM.msg,
      p_addons:Object.keys(PICKED).filter(k=>PICKED[k]),
      p_idem:idemKey(),
      p_authcode:AUTHZ?AUTHZ.AuthCode:null
    });
    if(!res.ok){LASTERR=res.error;SUBMITTING=false;b.disabled=false;b.textContent="Place order";return render();}
    IDEM=null; AUTHZ=null;                     // consumed — a new checkout gets a new key
    const sv=document.getElementById("f_savead");
    if(AUTH && sv && sv.checked){
      await rpc("fn_save_shipto",{p_co:CO,p_dv:DV,p_dp:DP,p_customer:CUSTID(),p_addr:{
        ShipToName:(FORM.first+" "+FORM.last).trim(),ShipToAddress1:FORM.addr1,
        ShipToCity:FORM.city,ShipToState:FORM.state,ShipToZip:FORM.zip,ShipToPhone:FORM.phone}});
    }
    PICKED={};COUPON=null;GIFT=null;QUOTE=null;CPNMSG="";GCMSG="";SUBMITTING=false;
    await loadCart(); if(AUTH) await loadAccount();
    go("done",res);
  }catch(e){LASTERR=e.message;SUBMITTING=false;b.disabled=false;b.textContent="Place order";render();}
}
function vDone(r){
  const tx=r.tax&&r.tax.Lines?r.tax.Lines:[];
  return `<div class="wrap"><div class="content"><div class="ok">
    <div class="eb">Order confirmed &amp; saved</div><h1>Thank you!</h1>
    <div class="onum">${r.OrderNumber}</div>
    <table class="tbl" style="margin-top:16px;max-width:520px">
      <tr><td>Goods</td><td align="right">${money(r.Subtotal)}</td></tr>
      ${Number(r.Discount)?`<tr><td>Coupon discount</td><td align="right">−${money(r.Discount)}</td></tr>`:''}
      <tr><td>Delivery (${r.delivery&&r.delivery.rate_basis})</td><td align="right">${money(r.Freight)}</td></tr>
      ${Number(r.ServiceCharge)?`<tr><td>Service charge</td><td align="right">${money(r.ServiceCharge)}</td></tr>`:''}
      ${tx.map(l=>`<tr><td>${l.Description} ${l.TaxPercent}%${l.TaxOnTax?' <i>(on tax)</i>':''}</td><td align="right">${money(l.Tax)}</td></tr>`).join("")}
      <tr><td><b>Total</b></td><td align="right"><b>${money(r.Total)}</b></td></tr>
      ${Number(r.GiftCardApplied)?`<tr><td>Gift card applied</td><td align="right">−${money(r.GiftCardApplied)}</td></tr>
      <tr><td><b>Balance due</b></td><td align="right"><b>${money(r.BalanceDue)}</b></td></tr>`:''}
    </table>
    <p style="color:var(--muted)">Saved to <b>OrderHeader</b> + <b>OrderDetail</b>. It is now visible in the back office Orders list.</p>
    <button class="btn" onclick="go('lookup','${r.OrderNumber}')">Track this order</button>
    <button class="btn ghost" onclick="go('home')">Keep shopping</button>
  </div></div></div>`;
}
function vLookup(p){return `<div class="wrap"><div class="phead"><div class="eb">Verification</div><h1>Track order</h1></div>
  <div class="content"><div class="card2"><div class="form"><div class="full"><label>Order number</label>
  <input id="lk" value="${p||""}"></div></div><div style="height:12px"></div>
  <button class="btn" onclick="doLookup()">Fetch from database</button><div id="lkout"></div></div></div></div>`;}
async function doLookup(){
  const n=val("lk").trim(),out=document.getElementById("lkout");
  if(!n)return out.innerHTML='<div class="err">Enter an order number.</div>';
  out.innerHTML='<div class="load">Querying…</div>';
  const h=await api(`OrderHeader?OrderNumber=eq.${encodeURIComponent(n)}&select=*`);
  if(!h.length)return out.innerHTML='<div class="err">No such order.</div>';
  const d=await api(`OrderDetail?OrderNumber=eq.${encodeURIComponent(n)}&select=*&order=LineId`),o=h[0];
  out.innerHTML=`<div style="height:16px"></div><table class="tbl">
    ${[["OrderNumber",o.OrderNumber],["Status",ostat(o)],["Recipient",o.ShippingName],
       ["Deliver to",[o.ShippingCity,o.ShippingZip].join(" ")],["Due",(o.OrderDueDate||"").slice(0,10)],
       ["Tax group",o.TaxGroupID],["Ship method",o.ShipMethodID],["Coupon",o.DiscountCouponCode||"—"],
       ["Gift card",o.GiftCertificate||"—"],["Total",money(o.Total)],["Balance due",money(o.BalanceDue)]]
      .map(r=>`<tr><th style="width:170px">${r[0]}</th><td>${r[1]??""}</td></tr>`).join("")}</table>
    <div style="height:14px"></div><table class="tbl"><thead><tr><th>#</th><th>Item</th><th>Qty</th><th>Unit</th><th>Total</th></tr></thead>
    <tbody>${d.map(l=>`<tr><td>${l.LineId}</td><td>${l.Description}</td><td>${Number(l.OrderQty)}</td>
      <td>${money(l.ItemUnitPrice)}</td><td>${money(l.SubTotal)}</td></tr>`).join("")}</tbody></table>`;
}

/* ---------- account views ---------- */
function vSignIn(){
  return `<div class="wrap"><div class="phead"><div class="eb">Account</div><h1>Sign in</h1></div>
  <div class="content two"><div class="card2">
    ${AUTHERR?`<div class="err">${AUTHERR}</div>`:""}
    <div class="form">
      <div class="full"><label>Email</label><input id="a_email" type="email" placeholder="you@example.com"></div>
      <div class="full"><label>Password</label><input id="a_pass" type="password"></div>
    </div><div style="height:14px"></div>
    <button class="btn" onclick="doLogin()">Sign in</button>
    <div class="note">New here? <span class="lnk" onclick="go('register')">Create an account</span></div>
  </div>
  <div class="card2"><div class="fs">Why sign in?</div>
    <p style="color:var(--muted)">Save recipients to your address book, see your order history, keep a wishlist and earn loyalty points.</p>
    <div class="note">Passwords are hashed by the identity provider. We never store your password in the customer record.</div>
  </div></div></div>`;
}
function vRegister(){
  return `<div class="wrap"><div class="phead"><div class="eb">Account</div><h1>Create an account</h1></div>
  <div class="content two"><div class="card2">
    ${AUTHERR?`<div class="err">${AUTHERR}</div>`:""}
    <div class="form">
      <div><label>First name</label><input id="a_first"></div>
      <div><label>Last name</label><input id="a_last"></div>
      <div class="full"><label>Email</label><input id="a_email" type="email"></div>
      <div class="full"><label>Phone</label><input id="a_phone"></div>
      <div class="full"><label>Password (min 8 characters)</label><input id="a_pass" type="password"></div>
    </div><div style="height:14px"></div>
    <button class="btn" onclick="doRegister()">Create account</button>
    <div class="note">Already have an account? <span class="lnk" onclick="go('signin')">Sign in</span></div>
  </div>
  <div class="card2"><div class="fs">Your profile</div>
    <p style="color:var(--muted)">Creates a record in <b>CustomerInformation</b> and subscribes you to order emails
    (<b>CustomerEmailList</b>). Your password is stored by the identity provider, hashed — never in the customer table.</p>
  </div></div></div>`;
}
function vAccount(){
  if(!AUTH) return vSignIn();
  const p=PROFILE||{};
  return `<div class="wrap"><div class="phead"><div class="eb">Account</div><h1>Hello, ${p.CustomerFirstName||AUTH.email}</h1>
    <div style="color:var(--muted)">${AUTH.email} &middot; <span class="lnk" onclick="doLogout()">Sign out</span></div></div>
  <div class="content">
    ${LOYALTY?`<div class="card2" style="margin-bottom:16px"><b>Loyalty:</b> ${LOYALTY.points} points
      <span style="color:var(--muted)">(redeemable at ${LOYALTY.Minimumpoints})</span></div>`:""}
    <div class="two">
      <div class="card2"><div class="fs">Order history <span style="font-size:12px;color:var(--muted)">(${MYORDERS.length})</span></div>
        ${MYORDERS.length?`<table class="tbl"><thead><tr><th>Order</th><th>Date</th><th>Deliver to</th><th>Status</th><th>Total</th></tr></thead>
        <tbody>${MYORDERS.map(o=>`<tr><td class="lnk" onclick="go('lookup','${o.OrderNumber}')">${o.OrderNumber}</td>
          <td>${(o.OrderDate||"").slice(0,10)}</td><td>${o.ShippingName||""}</td>
          <td>${ostat(o)}</td><td>${money(o.Total)}</td></tr>`).join("")}</tbody></table>`
        :'<p style="color:var(--muted)">No orders yet.</p>'}
      </div>
      <div class="card2"><div class="fs">Your details</div>
        <div class="form">
          <div><label>First name</label><input id="p_first" value="${p.CustomerFirstName||""}"></div>
          <div><label>Last name</label><input id="p_last" value="${p.CustomerLastName||""}"></div>
          <div class="full"><label>Phone</label><input id="p_phone" value="${p.CustomerPhone||""}"></div>
          <div class="full"><label>Address</label><input id="p_addr1" value="${p.CustomerAddress1||""}"></div>
          <div><label>City</label><input id="p_city" value="${p.CustomerCity||""}"></div>
          <div><label>State</label><input id="p_state" value="${p.CustomerState||""}"></div>
          <div><label>ZIP</label><input id="p_zip" value="${p.CustomerZip||""}"></div>
        </div><div style="height:12px"></div>
        <button class="btn ghost" onclick="saveProfile()">Save profile</button>
      </div>
    </div>
    <div style="height:16px"></div>
    <div class="two">
      <div class="card2"><div class="fs">Address book <span style="font-size:12px;color:var(--muted)">(CustomerShipToLocations)</span></div>
        ${ADDRESSES.length?ADDRESSES.map(a=>`<div class="row"><div class="gr">
          <b>${a.ShipToName||""}</b><div style="color:var(--muted);font-size:12.5px">
          ${[a.ShipToAddress1,a.ShipToCity,a.ShipToState,a.ShipToZip].filter(Boolean).join(", ")}</div></div>
          <span class="lnk" onclick="delAddress(${a.id})">Delete</span></div>`).join("")
          :'<p style="color:var(--muted)">No saved recipients yet.</p>'}
        <div style="height:12px"></div>
        <div class="form">
          <div class="full"><label>Recipient name</label><input id="s_name"></div>
          <div class="full"><label>Address</label><input id="s_addr1"></div>
          <div><label>City</label><input id="s_city"></div>
          <div><label>State</label><input id="s_state" value="MI"></div>
          <div><label>ZIP</label><input id="s_zip"></div>
          <div><label>Phone</label><input id="s_phone"></div>
        </div><div style="height:12px"></div>
        <button class="btn ghost" onclick="saveAddress()">Add recipient</button>
      </div>
      <div class="card2"><div class="fs">Wishlist <span style="font-size:12px;color:var(--muted)">(InventoryWishList)</span></div>
        ${WISH.length?WISH.map(w=>{const it=ITEMS[w.ItemID]||{};
          return `<div class="row"><div class="th"><img src="${it.PictureURL||""}"></div>
          <div class="gr"><b>${it.ItemName||w.ItemID}</b><div style="color:var(--muted)">${money(it.Price)}</div></div>
          <span class="lnk" onclick="toggleWish('${esc(w.ItemID)}')">Remove</span></div>`;}).join("")
          :'<p style="color:var(--muted)">Nothing saved yet.</p>'}
      </div>
    </div>
  </div></div>`;
}

function render(){
  const p=ROUTE.page,a=document.getElementById("app");
  const al=document.getElementById("acctlink");
  if(al) al.textContent = AUTH ? (PROFILE&&PROFILE.CustomerFirstName ? PROFILE.CustomerFirstName : "My account") : "Sign in";
  a.innerHTML=p==="home"?vHome():p==="cat"?vCat(ROUTE.arg):p==="item"?vItem(ROUTE.arg):p==="page"?vPage(ROUTE.arg)
    :p==="cart"?vCart():p==="checkout"?vCheckout():p==="done"?vDone(ROUTE.arg):p==="lookup"?vLookup(ROUTE.arg)
    :p==="signin"?vSignIn():p==="register"?vRegister():p==="account"?vAccount():vHome();
  if(p==="home"&&SLIDES.length>1){clearInterval(slideTimer);
    slideTimer=setInterval(()=>{if(ROUTE.page!=="home"){clearInterval(slideTimer);return;}
      slideIdx=(slideIdx+1)%SLIDES.length;render();},8000);}
  if(p==="checkout"&&!FORM.date){initDeliveryDate();return;}   // ask the server for the first deliverable date
  if(p==="checkout"&&QUOTE===null){refreshQuote();}
  if(p==="checkout"){msgCount();}
}
/* Default the delivery date to the first date the shop can ACTUALLY deliver to this ZIP.
   Defaulting to "tomorrow" quoted a Sunday, which the delivery rules then refused. */
async function initDeliveryDate(){
  try{ FORM.date = await rpc("fn_next_delivery_date",{p_co:CO,p_dv:DV,p_dp:DP,p_zip:FORM.zip}); }
  catch(e){ FORM.date = new Date(Date.now()+86400000).toISOString().slice(0,10); }
  QUOTE=null; render();
}
(async function(){try{
  loadAuth();
  await loadStore();applyTheme();applyChrome();
  await loadCart();
  if(AUTH) await loadAccount();
  render();
}catch(e){document.getElementById("app").innerHTML='<div class="wrap"><div class="err">Could not load: '+e.message+'</div></div>';}})();
</script>
</body>
</html>
